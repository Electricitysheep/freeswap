name: Health Check

on:
  schedule:
    # Daily at 6AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  validate:
    name: Validate Registry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate registry
        run: npm run validate