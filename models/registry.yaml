# FreeSwap Model Registry
# Community-maintained list of verified free LLM models.
# Last updated: 2026-05-11
# To contribute: https://github.com/yourusername/freeswap
---
version: "1.0"
lastUpdated: "2026-05-11"

# Meta-model definitions map meta-model names to ordered provider chains.
# Providers listed first are tried first.
metaModels:
  free:
    description: "Max availability — rotates across all available providers"
    chains:
      - [groq, gemini, openrouter, cerebras, mistral, nvidia-nim, cloudflare, github-models, kiro, opencode-free]
  free-fast:
    description: "Lowest latency — fastest providers first"
    chains:
      - [groq, cerebras, gemini, nvidia-nim]
      - [openrouter, mistral, cloudflare, github-models]
  free-smart:
    description: "Best reasoning — most capable providers first"
    chains:
      - [gemini, nvidia-nim, groq, openrouter]
      - [cerebras, mistral, github-models, cloudflare]

